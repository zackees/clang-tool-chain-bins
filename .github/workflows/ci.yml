name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace
      - name: Build CLI
        run: cargo build --release -p ctcb-cli

  python:
    name: Python Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install maturin and build
        # --no-install-project + --no-sync: build/install the extension via the
        # maturin CLI directly instead of routing the editable install through
        # the PEP 517 backend. soldr's compile daemon fails to start on macOS
        # runners (soldr backend, 0.7.98), and the backend build would be a
        # redundant second compile anyway. Backend coverage is preserved by the
        # ubuntu-only "PEP 517 backend smoke" step below.
        run: |
          uv sync --no-install-project
          uv run --no-sync maturin develop --release
      - name: Run Python tests
        run: uv run --no-sync pytest python/tests/ -v
      - name: Validate clang-extra build, indexes, query, and install behavior
        run: >-
          uv run --no-sync pytest
          tests/test_clang_extra_builder.py
          tests/test_clang_extra_validator.py
          tests/test_query.py
          tests/test_install.py
          tests/test_api.py -v
      - name: PEP 517 backend smoke (soldr builds the wheel)
        if: matrix.os == 'ubuntu-latest'
        run: uv build --wheel

  manifests:
    name: Manifest integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install pytest only (no Rust build needed)
        run: uv sync --no-install-project
      - name: Validate binary archive manifests
        run: uv run --no-project --with pytest pytest tests/test_manifest_integrity.py -v

  release-lint:
    name: Release lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Validate workspace + crate versions before release time
        run: python ci/release_lint.py

  build-wheels:
    name: Build wheel (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            zig: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            zig: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            zig: false
          - os: macos-latest
            target: x86_64-apple-darwin
            zig: false
          - os: macos-latest
            target: aarch64-apple-darwin
            zig: false
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install zig (cross-compile)
        if: matrix.zig
        uses: mlugg/setup-zig@v2
      - name: Build wheel
        # --no-install-project: the wheel is built by the maturin CLI below
        # (which ignores [build-system]); installing the project editable via
        # the soldr PEP 517 backend first is a wasted compile and fails on
        # macOS runners (soldr daemon does not start there — soldr 0.7.98).
        run: |
          uv sync --no-install-project
          uv run --no-sync maturin build --release --target ${{ matrix.target }} ${{ matrix.zig && '--zig' || '' }} --out dist
        shell: bash
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl
