name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: ctcb
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: ctcb
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: ctcb.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            binary: ctcb.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: ctcb
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: ctcb
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install zig (Linux cross-compile)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: mlugg/setup-zig@v2
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }} -p ctcb-cli
      - name: Build wheel
        run: |
          uv sync
          uv run maturin build --release --target ${{ matrix.target }} --out dist
        shell: bash
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare release assets
        run: |
          mkdir -p release
          # Package binaries
          for dir in artifacts/binary-*; do
            target=$(basename "$dir" | sed 's/binary-//')
            if [[ "$target" == *windows* ]]; then
              cp "$dir/ctcb.exe" "release/ctcb-${target}.exe"
            else
              cp "$dir/ctcb" "release/ctcb-${target}"
            fi
          done
          # Copy wheels
          cp artifacts/wheel-*/*.whl release/
          # Generate checksums
          cd release && sha256sum * > SHA256SUMS.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
