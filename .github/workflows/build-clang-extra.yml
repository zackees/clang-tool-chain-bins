name: Build and validate clang-extra archives

on:
  workflow_dispatch:
    inputs:
      exercise_forge_fallback:
        description: Also prove the pinned native Windows ARM64 Forge fallback
        required: false
        default: false
        type: boolean
      windows_arm64_only:
        description: Build only the native Windows ARM64 official lane
        required: false
        default: false
        type: boolean
      published_version:
        description: Validate this published package version on native Windows ARM64
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  official:
    name: ${{ matrix.platform }}/${{ matrix.arch }} (upstream)
    if: ${{ !inputs.windows_arm64_only && inputs.published_version == '' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2025
            platform: win
            arch: x86_64
            version: "21.1.5"
            commit: 8e2cd28cd4ba46613a46467b0c91b1cabead26cd
          - runner: ubuntu-24.04
            platform: linux
            arch: x86_64
            version: "21.1.5"
            commit: 8e2cd28cd4ba46613a46467b0c91b1cabead26cd
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            version: "21.1.5"
            commit: 8e2cd28cd4ba46613a46467b0c91b1cabead26cd
          - runner: macos-14
            platform: darwin
            arch: arm64
            version: "21.1.6"
            commit: a832a5222e489298337fbb5876f8dcaf072c5cca
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install pyzstd fasteners json5
      - name: Build from exact upstream distribution
        run: >-
          python tools/create_clang_extra_archives.py --download
          --work-dir tools/work/clang-extra
          --output-dir out/assets/clang-extra
          --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}
          --version ${{ matrix.version }} --llvm-commit ${{ matrix.commit }}
      - name: Generate archive index
        shell: bash
        run: >-
          python -m clang_tool_chain_bins._impl.archive_index
          --assets-root out/assets
          --aggregate-output out/tools/data/tool-index.json
          --meta-output out/tools/data/index-meta.json
      - name: Native clangd validation
        run: >-
          python tools/validate_clang_extra.py
          out/assets/clang-extra/${{ matrix.platform }}/${{ matrix.arch }}/clang-extra-${{ matrix.version }}-${{ matrix.platform }}-${{ matrix.arch }}.tar.zst
          --platform ${{ matrix.platform }} --expected-major 21 --expected-arch ${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: clang-extra-${{ matrix.platform }}-${{ matrix.arch }}
          path: out
          if-no-files-found: error

  windows-arm64-official:
    name: win/arm64 (upstream, native validation)
    if: ${{ inputs.published_version == '' }}
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install pyzstd fasteners json5
      - name: Build SHA256-pinned official LLVM 21.1.5 payload
        run: >-
          python tools/create_clang_extra_archives.py --download
          --work-dir tools/work/clang-extra
          --output-dir out/assets/clang-extra
          --platform win --arch arm64 --version 21.1.5
          --llvm-commit 8e2cd28cd4ba46613a46467b0c91b1cabead26cd
      - name: Generate archive index
        shell: bash
        run: >-
          python -m clang_tool_chain_bins._impl.archive_index
          --assets-root out/assets
          --aggregate-output out/tools/data/tool-index.json
          --meta-output out/tools/data/index-meta.json
      - name: Native ARM64 tools, runtime, and clangd fixture validation
        run: >-
          python tools/validate_clang_extra.py
          out/assets/clang-extra/win/arm64/clang-extra-21.1.5-win-arm64.tar.zst
          --platform win --expected-major 21 --expected-arch arm64
      - name: Clean-home query, resolve, install, ensure, and stale-marker validation
        run: >-
          python tools/validate_clang_extra_install.py
          out/tools/data/tool-index.json
          out/assets/clang-extra/win/arm64/clang-extra-21.1.5-win-arm64.tar.zst
          --platform win --arch arm64 --version 21.1.5 --expected-major 21
      - uses: actions/upload-artifact@v4
        with:
          name: clang-extra-win-arm64
          path: out
          if-no-files-found: error

  windows-arm64-forge-fallback:
    name: win/arm64 (Forge fallback proof)
    if: ${{ inputs.exercise_forge_fallback && inputs.published_version == '' }}
    uses: zackees/forge/.github/workflows/forge-conan.yml@main
    with:
      recipe_repo: zackees/clang-tool-chain-bins
      recipe_ref: ${{ github.ref_name }}
      recipe_path: ci/clangd
      name: clangd
      version: "21.1.5"
      build_type: Release
      windows_x64: false
      windows_x64_gnu: false
      windows_arm64: true
      linux_x64: false
      linux_arm64: false
      linux_x64_musl: false
      linux_arm64_musl: false
      macos_x64: false
      macos_arm64: false

  macos-x86-source:
    name: darwin/x86_64 (Forge source fallback)
    if: ${{ !inputs.windows_arm64_only && inputs.published_version == '' }}
    runs-on: macos-15-large
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install pyzstd fasteners json5
      - name: Build pinned clangd source fallback
        shell: bash
        run: |
          brew install cmake ninja
          git clone --filter=blob:none --no-checkout https://github.com/llvm/llvm-project.git llvm-project
          git -C llvm-project checkout a832a5222e489298337fbb5876f8dcaf072c5cca
          cmake -S llvm-project/llvm -B llvm-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_ENABLE_PROJECTS='clang;clang-tools-extra' \
            -DLLVM_TARGETS_TO_BUILD=X86 \
            -DLLVM_ENABLE_ASSERTIONS=OFF
          cmake --build llvm-build --target clangd --parallel "$(sysctl -n hw.ncpu)"
          python - <<'PY'
          from pathlib import Path
          import pyzstd, tarfile
          archive = Path('assets/clang-extra/darwin/x86_64/clang-extra-21.1.6-darwin-x86_64.tar.zst')
          root = Path('merged')
          root.mkdir()
          with archive.open('rb') as raw, pyzstd.ZstdFile(raw) as compressed, tarfile.open(fileobj=compressed, mode='r|') as tar:
              tar.extractall(root)
          (root / 'bin').mkdir(exist_ok=True)
          (root / 'lib').mkdir(exist_ok=True)
          import shutil
          shutil.copy2('llvm-build/bin/clangd', root / 'bin/clangd')
          shutil.copytree('llvm-build/lib/clang', root / 'lib/clang')
          PY
          python tools/create_clang_extra_archives.py \
            --source-dir merged --output-dir out/assets/clang-extra \
            --platform darwin --arch x86_64 --version 21.1.6 \
            --llvm-commit a832a5222e489298337fbb5876f8dcaf072c5cca \
            --provenance-method forge \
            --build-options-json '{"generator":"Ninja","build_type":"Release","LLVM_ENABLE_PROJECTS":"clang;clang-tools-extra","LLVM_TARGETS_TO_BUILD":"X86"}'
      - name: Generate archive index
        shell: bash
        run: >-
          python -m clang_tool_chain_bins._impl.archive_index
          --assets-root out/assets
          --aggregate-output out/tools/data/tool-index.json
          --meta-output out/tools/data/index-meta.json
      - name: Native clangd validation
        run: >-
          python tools/validate_clang_extra.py
          out/assets/clang-extra/darwin/x86_64/clang-extra-21.1.6-darwin-x86_64.tar.zst
          --platform darwin --expected-major 21 --expected-arch x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: clang-extra-darwin-x86_64
          path: out
          if-no-files-found: error

  windows-arm64-published-install:
    name: win/arm64 (published clean install)
    if: ${{ inputs.published_version != '' }}
    runs-on: windows-11-arm
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install only the published package and declared dependencies
        env:
          PACKAGE_VERSION: ${{ inputs.published_version }}
        run: python -m pip install "clang-tool-chain-bins==$env:PACKAGE_VERSION"
      - name: Query, resolve, install, ensure, and execute native clangd
        shell: pwsh
        run: |
          @'
          from pathlib import Path, PurePosixPath
          import subprocess
          import tempfile
          import clang_tool_chain_bins as bins

          filters = {
              "platform": "win",
              "arch": "arm64",
              "version": "21.1.5",
              "component": "clang-extra",
          }
          with tempfile.TemporaryDirectory(prefix="published-clang-extra-") as directory:
              root = Path(directory)
              queried = bins.query("clangd", home_dir=root / "query", **filters)
              assert len(queried) == 1 and len(queried[0].matches) == 1
              match = bins.resolve_one("clangd", **filters)
              installed = bins.install("clangd", home_dir=root / "install", **filters)[0]
              tool = Path(installed.install_path).joinpath(*PurePosixPath(match.path_in_archive).parts)
              result = subprocess.run([str(tool), "--version"], capture_output=True, text=True, check=True)
              assert "version 21." in result.stdout, result.stdout
              ensured = bins.ensure("clangd", home_dir=root / "ensure", **filters)[0]
              ensured_tool = Path(ensured.install_path).joinpath(*PurePosixPath(match.path_in_archive).parts)
              subprocess.run([str(ensured_tool), "--version"], check=True)
          print("published native Windows ARM64 clean-install validation passed")
          '@ | python -
